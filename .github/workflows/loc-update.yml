name: Update LOC Snapshot

on:
  workflow_dispatch:
  schedule:
    - cron: "10 15 * * *" # 00:10 JST daily

jobs:
  update-loc:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Push LOC to Supabase
        env:
          APP_ID: dev-roi-dashboard
          PROJECT_ROOT: .
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: node scripts/loc-count.mjs
